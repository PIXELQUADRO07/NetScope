<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NetScope</title>
    <!-- Tailwind Play CDN for rapid prototyping -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body class="bg-gradient-to-b from-slate-900 to-slate-800 text-slate-100">
    <div id="app">
      <nav class="max-w-5xl mx-auto p-4 flex gap-4 items-center">
        <router-link to="/" class="text-slate-200 hover:text-white">Home</router-link>
        <router-link to="/history" class="text-slate-200 hover:text-white">History</router-link>
      </nav>

      <div class="max-w-5xl mx-auto p-6">
        <router-view></router-view>
      </div>
    </div>

    <!-- Templates -->
    <script type="text/x-template" id="home">
      <div>
        <header class="mb-6">
          <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-indigo-500">NetScope</h1>
          <p class="text-slate-300">Interfaccia web per la scansione e il reporting</p>
        </header>

        <main class="space-y-5">
          <section class="bg-slate-900/60 p-5 rounded-lg shadow-lg hover:shadow-xl transition">
            <h2 class="text-lg font-semibold">Scansione Locale</h2>
            <div class="flex gap-3 items-center mt-3">
              <label class="flex items-center gap-2">Concurrency
                <input v-model.number="localConcurrency" type="number" min="1" class="ml-2 w-24 rounded-md px-2 py-1 bg-slate-800 border border-slate-700" />
              </label>
              <button @click="localScan" class="px-3 py-1 rounded-md bg-gradient-to-b from-blue-500 to-indigo-600">Scan</button>
              <span v-if="localLoading" class="inline-flex items-center gap-2 text-sm text-slate-300">
                <svg class="w-5 h-5 animate-spin text-sky-400" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/><path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" class="opacity-75"/></svg>
                Scanning...
              </span>
            </div>
            <pre v-if="localResult" class="mt-3 bg-black/30 p-3 rounded text-sm overflow-auto max-h-48">{{ pretty(localResult) }}</pre>
          </section>

          <section class="bg-slate-900/60 p-5 rounded-lg shadow-lg hover:shadow-xl transition">
            <h2 class="text-lg font-semibold">Reverse DNS</h2>
            <div class="flex gap-3 items-center mt-3">
              <input v-model="revIP" placeholder="8.8.8.8" class="rounded-md px-2 py-1 bg-slate-800 border border-slate-700" />
              <button @click="reverseLookup" class="px-3 py-1 rounded-md bg-gradient-to-b from-emerald-500 to-green-600">Lookup</button>
              <span v-if="revLoading" class="inline-flex items-center gap-2 text-sm text-slate-300">
                <svg class="w-5 h-5 animate-spin text-green-300" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/><path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" class="opacity-75"/></svg>
                Looking up...
              </span>
            </div>
            <pre v-if="revResult" class="mt-3 bg-black/30 p-3 rounded text-sm overflow-auto max-h-48">{{ pretty(revResult) }}</pre>
          </section>

          <section class="bg-slate-900/60 p-5 rounded-lg shadow-lg hover:shadow-xl transition">
            <h2 class="text-lg font-semibold">SSL Certificate</h2>
            <div class="flex gap-3 items-center mt-3">
              <input v-model="sslHost" placeholder="example.com" class="rounded-md px-2 py-1 bg-slate-800 border border-slate-700" />
              <input v-model="sslPort" placeholder="443" class="w-20 rounded-md px-2 py-1 bg-slate-800 border border-slate-700" />
              <button @click="getSSL" class="px-3 py-1 rounded-md bg-gradient-to-b from-pink-500 to-rose-600">Get Cert</button>
              <span v-if="sslLoading" class="inline-flex items-center gap-2 text-sm text-slate-300">
                <svg class="w-5 h-5 animate-spin text-pink-300" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/><path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" class="opacity-75"/></svg>
                Fetching...
              </span>
            </div>
            <pre v-if="sslResult" class="mt-3 bg-black/30 p-3 rounded text-sm overflow-auto max-h-48">{{ pretty(sslResult) }}</pre>
          </section>
        </main>
      </div>
    </script>

    <script type="text/x-template" id="history">
      <div>
        <h2 class="text-xl font-semibold mb-3">Scan History</h2>
        <div class="mb-3">
          <button @click="clearHistory" class="px-3 py-1 rounded bg-red-600 text-white">Clear History</button>
        </div>
        <div v-if="entries.length===0" class="text-slate-400">No history yet.</div>
        <ul class="space-y-3">
          <li v-for="(e,idx) in entries" :key="e.ts" class="bg-slate-900/50 p-3 rounded">
            <div class="flex justify-between items-start gap-3">
              <div>
                <div class="text-sm text-slate-300">{{ formatTS(e.ts) }} — <strong class="capitalize">{{ e.type }}</strong></div>
                <pre class="text-xs mt-2 bg-black/20 p-2 rounded max-h-40 overflow-auto">{{ pretty(e) }}</pre>
              </div>
            </div>
          </li>
        </ul>
      </div>
    </script>

    <!-- Vue and Router CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
